<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#0a0e27,#1a1535,#2d1b4e);
  overflow:hidden;
  color:white;
}

/* Cosmic glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%,rgba(157,78,221,.2),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(76,201,240,.2),transparent 40%);
  animation: float 20s ease-in-out infinite;
}
@keyframes float{
  50%{transform:scale(1.1)}
}

.container{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:52px;
  position:relative;
  z-index:1;
}

/* Brand */
.brand{
  display:flex;
  align-items:center;
  gap:26px;
}

/* Gradient-only logo background */
.logo-wrap{
  background:linear-gradient(135deg,#9d4edd,#4cc9f0);
  padding:18px;
  border-radius:28px;
  box-shadow:
    0 0 45px rgba(157,78,221,.6),
    0 12px 30px rgba(0,0,0,.35);
}

.logo-wrap img{
  width:96px;
  height:96px;
  border-radius:20px;
  display:block;
}

.brand h1{
  font-size:80px;
  font-weight:800;
  background:linear-gradient(90deg,#9d4edd,#4cc9f0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Navigation buttons */
.buttons{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:18px;
  width:90%;
  max-width:900px;
}

.icon-btn{
  height:72px;
  border-radius:999px;
  background:rgba(26,21,53,.75);
  border:2px solid rgba(157,78,221,.35);
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 26px;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 0 22px rgba(157,78,221,.3);
  text-decoration:none;
  color:white;
  font-weight:600;
}

.icon-btn i{
  font-size:22px;
  color:#4cc9f0;
}

.icon-btn:hover{
  transform:translateY(-3px);
  border-color:#4cc9f0;
  box-shadow:0 0 40px rgba(76,201,240,.6);
}

/* Download section */
.download-section{
  margin-top:6px;
  display:flex;
  justify-content:center;
}

.download-btn{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px 30px;
  border-radius:20px;
  background:linear-gradient(135deg,#9d4edd,#4cc9f0);
  color:white;
  font-weight:700;
  font-size:18px;
  text-decoration:none;
  box-shadow:
    0 10px 40px rgba(157,78,221,.6),
    0 0 40px rgba(76,201,240,.4);
  transition:all .25s ease;
}

.download-btn:hover{
  transform:translateY(-4px);
  box-shadow:
    0 15px 55px rgba(157,78,221,.8),
    0 0 65px rgba(76,201,240,.6);
}

.version-badge{
  font-size:13px;
  font-weight:700;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.25);
}
</style>
</head>

<body>

<div class="container">

  <!-- Brand -->
  <div class="brand">
    <div class="logo-wrap">
      <img src="https://ethanytangcodes.github.io/cosmos/logo.png" alt="Cosmos">
    </div>
    <h1>Cosmos</h1>
  </div>

  <!-- Navigation -->
  <div class="buttons">
    <a href="https://ethanytangcodes.github.io/art" class="icon-btn">
      <i class="fas fa-gamepad"></i> Games
    </a>
    <a href="https://ethanytangcodes.github.io/gamebois" class="icon-btn">
      <i class="fas fa-ghost"></i> Gameboy
    </a>
    <a href="https://ethanytangcodes.github.io/ai" class="icon-btn">
      <i class="fas fa-brain"></i> AI
    </a>
    <a href="https://ethanytangcodes.github.io/feedback.html" class="icon-btn">
      <i class="fas fa-comment"></i> Feedback
    </a>
  </div>

  <!-- Direct HTML download -->
  <div class="download-section">
    <a href="/cosmos/file.html" download class="download-btn">
      <i class="fas fa-download"></i>
      Download Cosmos
      <span class="version-badge">v1.0</span>
    </a>
  </div>

</div>

</body>
</html>
